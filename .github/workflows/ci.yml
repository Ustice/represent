name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - run: npm install --global corepack@0.35.0
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
